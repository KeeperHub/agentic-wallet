# Type: releaser | Publishes @keeperhub/wallet to npm on tag with OIDC trusted publishing.
# Trigger: tags matching `@keeperhub/wallet@*` (e.g. `@keeperhub/wallet@0.1.0`).
# Gates (all blocking): supply-chain-guard test + pnpm audit (runtime deps, high) + build + type-check + full test suite.
# Note: `pnpm audit --prod` is the pnpm-workspace equivalent of `npm audit --omit=dev`.
name: Publish @keeperhub/wallet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run all gates but skip the publish step'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node
        # Intentionally omit `registry-url`: actions/setup-node would otherwise write an .npmrc
        # with `_authToken=${NODE_AUTH_TOKEN}`. With OIDC trusted publishing NODE_AUTH_TOKEN is
        # unset, so the .npmrc ends up with empty auth and pnpm publish fails with ENEEDAUTH
        # instead of performing the OIDC token exchange.
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: ${{ github.event_name == 'push' }}
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Supply-chain guard (DIST-03)
        # Filter directly via `vitest run <path>`; `pnpm test -- <path>` does not forward positionals.
        run: pnpm exec vitest run tests/integration/supply-chain-guard.test.ts

      - name: Audit runtime dependencies (fail on high/critical)
        # pnpm audit --prod is the pnpm-workspace equivalent of npm audit --omit=dev
        run: pnpm audit --prod --audit-level high

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Full test suite
        # Runs after build so execFile-based CLI integration tests can invoke bin/keeperhub-wallet.js
        # which imports from dist/cli.js.
        run: pnpm test

      - name: Dry-run pack (inspect tarball contents)
        run: pnpm pack --dry-run

      - name: Upgrade npm for OIDC trusted publishing
        # npm 11.5.1+ has native OIDC trusted-publisher support. The Node 20 runner image ships
        # with an older npm that does not perform the id-token exchange automatically, so pnpm
        # and npm both fall back to ENEEDAUTH. Upgrade the global npm before publishing.
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
        run: npm install -g npm@latest

      - name: Publish to npm with provenance
        # Uses npm OIDC trusted publishing (configured at npmjs.com/package/@keeperhub/wallet/access).
        # With `id-token: write` granted above, `npm publish` detects the GitHub Actions OIDC
        # env (ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN) and exchanges it
        # for a short-lived publish token — no NPM_TOKEN required.
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
        run: npm publish --provenance --access public
